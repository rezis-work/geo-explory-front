# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `frontend/` is its own Git repo. If frontend lives inside a parent
# monorepo, either make the parent repo’s root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repository is the **frontend** app (Next.js, React, TypeScript).

            Focus on:
            - Correctness, hooks, and client/server boundaries
            - Security (XSS, unsafe HTML, env exposure, auth flows)
            - Performance (bundles, data fetching, caching)
            - Accessibility and UX regressions where relevant

            The PR branch is already checked out.

            Use `gh pr comment` for a short summary (prefix with **[Claude · frontend]**).
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for concrete issues.

            Only post GitHub comments—do not paste the full review as a workflow log only.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
