# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `frontend/` is its own Git repo. If frontend lives inside a parent
# monorepo, either make the parent repo's root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          allowed_tools: "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repository is the **frontend** app (Next.js 16, React 19, TypeScript, Tailwind CSS v4).

            ## Expected project structure

            ```
            src/
              app/                  # App Router — only layouts, pages, loading, error, not-found files
                (routes)/           # Route groups for layout sharing (no URL segment)
                layout.tsx          # Root layout — <html>, <body>, global providers
                page.tsx            # Route entry points only, no business logic
                globals.css         # Global styles and Tailwind @import
              components/
                ui/                 # Generic, reusable UI primitives (Button, Input, Modal…)
                [feature]/          # Feature-specific components grouped by domain
              hooks/                # Custom React hooks (use-*.ts)
              lib/                  # Pure utility functions, API clients, helpers
              types/                # Shared TypeScript interfaces and types (*.types.ts)
            public/                 # Static assets served at /
            ```

            ### Rules to enforce
            - **No business logic in `app/` pages** — pages compose components, that's it.
            - **Client components** (`"use client"`) must live in `components/`, never in `app/` layouts or pages unless unavoidable.
            - **Server components** are the default; only add `"use client"` when state/effects/browser APIs are needed.
            - **Hooks** belong in `src/hooks/`, not inlined in components or pages.
            - **Types** shared across more than one file go in `src/types/`, not re-declared per file.
            - **No barrel index.ts re-exports** unless the directory has 5+ exports.
            - **Tailwind only** for styling — no inline `style={{}}` objects, no CSS modules, no styled-components.
            - **`lib/`** must be framework-agnostic (no React imports).
            - **`public/`** is for static assets only — no JS/TS files there.

            ## Review steps
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changed files.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for PR title and description.
            3. Review the changes and flag:
               - Files placed in the wrong directory per the structure above
               - Client/server boundary violations
               - React hooks rules violations
               - Security issues (XSS, unsafe HTML, env variable exposure, auth flows)
               - Performance issues (missing Suspense, over-fetching, no caching)
               - Accessibility regressions
            4. Post your review with:
               `gh pr review ${{ github.event.pull_request.number }} --comment -b "**[Claude · frontend]** <your review here>"`

            Write a clear, structured review using markdown headers and bullet points.
            Only post via `gh pr review` — do not output the review to the workflow log only.
