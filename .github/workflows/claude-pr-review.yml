# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `frontend/` is its own Git repo. If frontend lives inside a parent
# monorepo, either make the parent repo's root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          allowed_tools: "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repository is the **frontend** app (Next.js, React, TypeScript).

            Steps:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changed files.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for PR title and description.
            3. Review the changes and focus on:
               - Correctness, React hooks rules, and client/server component boundaries
               - Security (XSS, unsafe HTML rendering, env variable exposure, auth flows)
               - Performance (bundle size, data fetching, caching strategies)
               - Accessibility and UX regressions
            4. Post your review with:
               `gh pr review ${{ github.event.pull_request.number }} --comment -b "**[Claude · frontend]** <your review here>"`

            Write a clear, structured review. Use markdown headers and bullet points.
            Only post via `gh pr review` — do not output the review to the workflow log only.
