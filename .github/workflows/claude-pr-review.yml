# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `frontend/` is its own Git repo. If frontend lives inside a parent
# monorepo, either make the parent repo's root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          allowed_tools: "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repository is the **frontend** app (Next.js 16, React 19, TypeScript, Tailwind CSS v4).

            ## Expected project structure

            ```
            src/
              app/                        # App Router — only layouts, pages, loading, error, not-found files
                (routes)/                 # Route groups for layout sharing (no URL segment)
                layout.tsx                # Root layout — <html>, <body>, global providers
                page.tsx                  # Route entry points only — composes module components
                globals.css               # Global styles and Tailwind @import
              modules/                    # One folder per feature/domain
                tours/                    # Example feature module
                  components/             # React components used only within this feature
                  ui/                     # Dumb/presentational primitives scoped to this feature
                  hooks/                  # Custom hooks scoped to this feature (use-*.ts)
                  services/               # API calls, server actions, data-fetching logic for this feature
                  types.ts                # TypeScript types/interfaces for this feature
                [other-feature]/          # Same structure repeated per feature
              components/                 # Shared UI components used across multiple modules
                ui/                       # Shared low-level primitives (Button, Input, Modal…)
              hooks/                      # Shared custom hooks used across multiple modules
              lib/                        # Shared pure utilities, API client setup, helpers
              types/                      # Shared TypeScript interfaces used across modules
            public/                       # Static assets served at /
            ```

            ### Rules to enforce
            - **Feature code lives in `modules/<feature>/`** — if code is only used by one feature, it must not be in the root `components/`, `hooks/`, or `lib/`.
            - **Shared code lives at the root level** — `src/components/`, `src/hooks/`, `src/lib/`, `src/types/` are only for things used by 2+ modules.
            - **`modules/<feature>/services/`** owns all API calls and server actions for that feature — no fetch/axios calls directly in components or hooks.
            - **`app/` pages are thin** — they import from `modules/`, compose layouts, and pass props. No business logic, no data fetching inside page files.
            - **Client components** (`"use client"`) go in `modules/<feature>/components/` or `modules/<feature>/ui/`, never in `app/` unless unavoidable.
            - **Server components** are the default; only add `"use client"` when state/effects/browser APIs are needed.
            - **No cross-module imports** — `modules/tours/` must not import from `modules/bookings/`. Shared logic must be lifted to `src/lib/` or `src/components/`.
            - **Tailwind only** for styling — no inline `style={{}}` objects, no CSS modules, no styled-components.
            - **`lib/`** must be framework-agnostic (no React imports).
            - **`public/`** is for static assets only — no JS/TS files there.
            - **No barrel index.ts re-exports** unless the directory has 5+ exports.

            ## Review steps
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changed files.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for PR title and description.
            3. Review the changes and flag:
               - Files placed in the wrong directory per the structure above
               - Client/server boundary violations
               - React hooks rules violations
               - Security issues (XSS, unsafe HTML, env variable exposure, auth flows)
               - Performance issues (missing Suspense, over-fetching, no caching)
               - Accessibility regressions
            4. Post your review with:
               `gh pr review ${{ github.event.pull_request.number }} --comment -b "**[Claude · frontend]** <your review here>"`

            Write a clear, structured review using markdown headers and bullet points.
            Only post via `gh pr review` — do not output the review to the workflow log only.
